apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: project
  name: todo-pg-stset
spec:
  serviceName: todo-pg-svc
  replicas: 1
  selector:
    matchLabels:
      app: todo-pg-app
  template:
    metadata:
      labels:
        app: todo-pg-app
    spec:
      containers:
        - name: postgresql-db
          image: postgres:18.4
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: todo-pg-configmap
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: todo-pg-configmap
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: todo-pg-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: todo-pg-data-storage
              mountPath: /var/lib/postgresql
  volumeClaimTemplates:
    - metadata:
        name: todo-pg-data-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 100Mi

---
apiVersion: v1
kind: Service
metadata:
  namespace: project
  name: todo-pg-svc
spec:
  ports:
    - port: 5432
      name: postgres
  clusterIP: None
  selector:
    app: todo-pg-app
