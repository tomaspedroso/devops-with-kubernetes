apiVersion: apps/v1
kind: Deployment
metadata:
  name: pingpong-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pingpong
  template:
    metadata:
      labels:
        app: pingpong
    spec:
      volumes:
        - name: shared-logs
          persistentVolumeClaim:
            claimName: logs-volume-claim
      containers:
        - name: pingpong
          image: tomaspedroso/pingpong
          volumeMounts:
            - name: shared-logs
              mountPath: /shared
          env:
            - name: PORT
              value: "3000"
